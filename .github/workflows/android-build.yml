name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gamevault/package-lock.json
        
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install dependencies
      run: |
        cd gamevault
        npm ci --legacy-peer-deps
      
    - name: Build Android APK
      run: |
        cd gamevault/android
        chmod +x gradlew
        # Используем NDK 27 и ограничиваем потоки для стабильности
        if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
          ./gradlew assembleRelease -PndkVersion=27.0.12077973 --no-daemon --max-workers 2
        else
          ./gradlew assembleDebug -PndkVersion=27.0.12077973 --no-daemon --max-workers 2
        fi
      env:
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
        EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
        EXPO_PUBLIC_APP_NAME: ${{ secrets.EXPO_PUBLIC_APP_NAME }}
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SaveState-${{ github.event.inputs.build_type || 'debug' }}-apk
        path: |
          gamevault/android/app/build/outputs/apk/debug/*.apk
          gamevault/android/app/build/outputs/apk/release/*.apk
        retention-days: 7

